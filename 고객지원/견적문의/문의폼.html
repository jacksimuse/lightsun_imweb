    <script>
    (function($) {
        $(function() {
            var WIDGET = '#w2026012635fd38c613935';
    
            // ──────────────────────────────────────
            // 1. 2열 배치: 이름 + 이메일
            //    ※ 이메일 필드 추가 후 아래 ID를 교체하세요
            // ──────────────────────────────────────
            var EMAIL_ID = '#email_56K120IeS3';
            var $name = $('#input_fe14f90c76fc3');
            var $email = $(EMAIL_ID);
            if ($name.length && $email.length) {
                var $row1 = $('<div class="ls-form-row"></div>');
                $name.before($row1);
                $row1.append($name).append($email);
            }
    
            // ──────────────────────────────────────
            // 2. 2열 배치: 휴대전화번호 + 설치주소지
            // ──────────────────────────────────────
            var $phone = $('#input_018e0a120816a');
            var $address = $('#input_33p5EpCO58');
            if ($phone.length && $address.length) {
                var $row2 = $('<div class="ls-form-row"></div>');
                $phone.before($row2);
                $row2.append($phone).append($address);
            }
    
            // ──────────────────────────────────────
            // 2.5 Placeholder 설정
            //     ※ 텍스트를 원하는 내용으로 교체하세요
            // ──────────────────────────────────────
            // select 기본 옵션 텍스트 변경
            var $selectOption = $('#select_108adc852820c select option[selected], #select_108adc852820c select option:first');
            if ($selectOption.length) {
                $selectOption.text('유형을 선택해 주세요.');
            }
    
            // input/textarea placeholder 설정
            var placeholders = {
                '#input_fe14f90c76fc3 .form-control': '이름을 입력해 주세요.',
                '#email_56K120IeS3 .form-control':    '이메일을 입력해 주세요.',
                '#input_018e0a120816a .form-control':  '숫자만 입력해 주세요.',
                '#input_33p5EpCO58 .form-control':    '주소를 입력해 주세요.',
                '#textarea_sQ83538GRi .form-control': '문의 내용을 입력해 주세요.'
            };
            $.each(placeholders, function(selector, text) {
                $(selector).attr('placeholder', text);
            });
    
            // ──────────────────────────────────────
            // 3. 첨부파일 - 버튼 옆에 파일명 입력폼
            // ──────────────────────────────────────
            var $fileGroup = $('#file_77D3674a24_w2026012635fd38c613935');
            var $fileInput = $fileGroup.find('input[type="file"]');
            if ($fileInput.length) {
                // 기존 버튼 영역(파일 input의 부모)을 건드리지 않고 옆에 display 추가
                var $btnArea = $fileInput.parent();
                var $display = $('<input type="text" class="ls-file-display" placeholder="파일을 업로드 하세요." readonly>');
                var $row = $('<div class="ls-file-row"></div>');
    
                $btnArea.wrap($row);
                $btnArea.after($display);
    
                // 파일 업로드 시 → placeholder 숨기기 (아임웹 자체 파일명 표시 사용)
                // 파일 삭제 시 → placeholder 다시 표시
                var checkFileState = function() {
                    var hasFile = $fileInput[0].files && $fileInput[0].files.length > 0;
                    var hasImwebDisplay = $fileGroup.find('[class*="file_item"], [class*="uploaded"], .file-name').length > 0;
                    if (hasFile || hasImwebDisplay) {
                        $display.hide();
                    } else {
                        $display.show();
                    }
                };
    
                $fileInput.on('change', checkFileState);
    
                // 아임웹의 파일 삭제(×) 감지
                var observer = new MutationObserver(checkFileState);
                observer.observe($fileGroup[0], { childList: true, subtree: true });
            }
    
             // ──────────────────────────────────────
            // 4. 개인정보 동의 - "전문보기" 토글
            // ──────────────────────────────────────
            var $privacy = $('#thirdparty');

            // 텍스트 교체: control-label "개인정보 제3자 제공 동의" → "개인정보처리방침"
            $privacy.find('.control-label').contents().filter(function() {
                return this.nodeType === 3;
            }).each(function() {
                this.textContent = this.textContent.replace('개인정보 제3자 제공 동의', '개인정보처리방침');
            });

            // 텍스트 교체: 체크박스 label span "개인정보 제3자 제공에 대해 동의합니다." → "개인정보처리방침에 동의합니다."
            $privacy.find('.checkbox.checkbox-styled label span').contents().filter(function() {
                return this.nodeType === 3;
            }).each(function() {
                this.textContent = this.textContent.replace('개인정보 제3자 제공에 대해 동의합니다.', '개인정보처리방침에 동의합니다.');
            });

            var $privacyContent = $privacy.find('.form-control');
            if ($privacyContent.length) {
                var $toggleLink = $('<span class="ls-thirdparty-toggle">전문보기</span>');
    
                 // label span 앞에 (필수) 텍스트 추가
                var $labelSpan = $privacy.find('.checkbox.checkbox-styled label span');
                if ($labelSpan.length && $labelSpan.find('.ls-required').length === 0) {
                    $labelSpan.prepend('<span class="ls-required">(필수) </span>');
                }
    
                // label 옆에 전문보기 링크 삽입 (별도 영역, 체크박스 없음)
                var $checkLabel = $privacy.find('input[type="checkbox"]').closest('label');
                if ($checkLabel.length) {
                    $checkLabel.after($toggleLink);
                } else {
                    $privacyContent.before($toggleLink);
                }
    
                // 팝업 모달 생성
                var contentHtml = $privacyContent.html();
                var $overlay = $('<div class="ls-privacy-overlay"><div class="ls-privacy-modal"><button class="ls-privacy-close">&times;</button><div class="ls-privacy-body">' + contentHtml + '</div></div></div>');
                $('body').append($overlay);
    
                // 전문보기 클릭 → 팝업 열기
                $toggleLink.on('click', function() {
                    $overlay.addClass('ls-show');
                });
    
                // 닫기 버튼 클릭 → 팝업 닫기
                $overlay.find('.ls-privacy-close').on('click', function() {
                    $overlay.removeClass('ls-show');
                });
    
                // 배경 클릭 → 팝업 닫기
                $overlay.on('click', function(e) {
                    if ($(e.target).hasClass('ls-privacy-overlay')) {
                        $overlay.removeClass('ls-show');
                    }
                });
    
                // 하단 안내 텍스트 추가
                var $bottomText = $('<div class="ls-thirdparty-bottom">위 동의를 거부할 권리가 있으며, 필수항목의 동의를 거부하실 경우 문의 처리 및 결과 회신이 제한됩니다.</div>');
                $privacy.append($bottomText);
            }
        });
    })(jQuery);
    </script>
