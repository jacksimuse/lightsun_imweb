<!-- ========================================
   가치 섹션 - 아임웹 코드 위젯용
   기능: 왼쪽 원형 그래픽 + 오른쪽 가치 리스트
======================================== -->

<style>
    /* ========== 가치 섹션 전체 컨테이너 ========== */
    .value-container {
        position: relative;
        width: 100%;
        max-width: 1200px;
        margin-left: 70px;
        padding: 60px 40px;
        box-sizing: border-box;
        background: #fff;
        overflow: hidden;
    }

    /* ========== 가치 섹션 내부 레이아웃 ========== */
    .value-inner {
        display: flex;
        align-items: center;
        gap: 310px;
    }

    /* ========== 왼쪽 영역 (원형 그래픽) ========== */
    .value-left {
        flex-shrink: 0;
        position: relative;
        width: 380px;
        height: 380px;
    }

    .value-circle {
        width: 100%;
        height: 100%;
        background: #fe5200;      /* 주황색 배경 */
        border-radius: 50%;       /* 원형 */
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        /* 원이 왼쪽으로 살짝 잘리는 효과 */
        margin-left: 100px;
    }

    .value-circle-text {
        font-size: 32px;          /* 글자 크기 */
        font-weight: 600;         /* 글자 굵기 */
        color: #fff;              /* 흰색 글자 */
        letter-spacing: 1px;
        margin-left: 0px;        /* 텍스트 위치 조정 */
    }

    /* ========== 오른쪽 영역 (가치 리스트) ========== */
    .value-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 40px;                /* 항목 간 간격 */
       
    }

    /* 개별 가치 항목 */
    .value-item {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .value-item-header {
        display: flex;
        align-items: baseline;
        gap: 15px;
    }

    .value-item-number {
        font-size: 28px;          /* 숫자 크기 */
        font-weight: 700;         /* 숫자 굵기 */
        color: #000;           /* 검정색 */
        line-height: 1;
    }

    .value-item-title {
        font-size: 30px;          /* 제목 크기 */
        font-weight: 700;         /* 제목 굵기 */
        color: #333;              /* 제목 색상 */
        letter-spacing: 2px;
        line-height: 1;
    }

    .value-item-desc {
        font-size: 22px;          /* 설명 크기 */
        font-weight: 400;         /* 설명 굵기 */
        color: #666;              /* 설명 색상 (연한 회색) */
        line-height: 1.5;
        margin-left: 43px;        /* 숫자 너비만큼 들여쓰기 */
        
    }

    /* ========== 모바일 대응 ========== */
    @media (max-width: 900px) {
        .value-container {
            padding: 40px 20px;
        }

        .value-inner {
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }

        .value-left {
            width: 280px;
            height: 280px;
            margin-left: 0;
        }

        .value-circle {
            margin-left: 0;
        }

        .value-circle-text {
            font-size: 24px;
            margin-left: 0;
        }

        .value-right {
            width: 100%;
            gap: 35px;
        }

        .value-item-number {
            font-size: 22px;
        }

        .value-item-title {
            font-size: 22px;
        }

        .value-item-desc {
            font-size: 14px;
            margin-left: 37px;
        }
    }

    @media (max-width: 480px) {
        .value-left {
            width: 220px;
            height: 220px;
        }

        .value-circle-text {
            font-size: 20px;
        }

        .value-item-number {
            font-size: 18px;
        }

        .value-item-title {
            font-size: 18px;
            letter-spacing: 1px;
        }

        .value-item-desc {
            font-size: 13px;
            margin-left: 33px;
        }
    }
</style>

<div class="value-container">
    <div class="value-inner">

        <!-- ========== 왼쪽 영역 (원형 그래픽) ========== -->
        <div class="value-left">
            <div class="value-circle">
                <span class="value-circle-text">Professionalism</span>
            </div>
        </div>

        <!-- ========== 오른쪽 영역 (가치 리스트) ========== -->
        <div class="value-right">

            <!-- 가치 1: LEADERSHIP -->
            <div class="value-item">
                <div class="value-item-header">
                    <span class="value-item-number">1</span>
                    <span class="value-item-title">LEADERSHIP</span>
                </div>
                <p class="value-item-desc">신재생에너지 선도 기업</p>
            </div>

            <!-- 가치 2: INTEGRATED -->
            <div class="value-item">
                <div class="value-item-header">
                    <span class="value-item-number">2</span>
                    <span class="value-item-title">INTEGRATED</span>
                </div>
                <p class="value-item-desc">태양광의 시작과 끝을 책임지는 기업!</p>
            </div>

            <!-- 가치 3: TRUSTED -->
            <div class="value-item">
                <div class="value-item-header">
                    <span class="value-item-number">3</span>
                    <span class="value-item-title">TRUSTED</span>
                </div>
                <p class="value-item-desc">고객과의 신뢰를 바탕으로 길을 걷는 기업</p>
            </div>

        </div>

    </div>
</div>
